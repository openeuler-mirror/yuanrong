- service: defaultservice # 服务名（必填）
  kind: yrlib # 函数类型（必填） 进程部署只支持 yrlib
  description: this is the default service # 函数描述（非必填）
  functions: # 函数（必填）
    default: # 函数名（必填）
      cpu: 0 # 函数 CPU 大小，单位：1/1000 核（必填）
      memory: 0 # 函数 MEM 大小，单位：MB（必填）
      runtime: python3.11 # 函数 runtime 类型（必填）
        # environment: # 函数环境变量，内置环境变量定义
      # "key1" : "value1"
      # storageType: "local" # 代码包存储类型，默认值为 local, 进程部署只支持 local: 代码包存储在磁盘中
      # codePath: "/home/sn/function-packages" # 代码包本地路径，默认值为空（除了 python，此项必填）
    py311:
      cpu: 0
      memory: 0
      runtime: python3.11
    py39:
      cpu: 0
      memory: 0
      runtime: python3.9
      rootfs:
        runtime: runc
        type: image
        imageurl: "aio-yr-runtime:latest"
        readonly: true
        mountpoint: /mnt
      bootstrap:
        type: path
        root: "/opt/uv/python/cpython-3.10-linux-x86_64-gnu/lib/python3.10/site-packages/yr/inner/runtime/service"
        entrypoint: "set -e; if [ -f /__yuanrong/python/yr/main/yr_runtime_main.py ]; then export PYTHONPATH=/__yuanrong/python:${PYTHONPATH}; export LD_LIBRARY_PATH=/__yuanrong/python/yr/cpp/lib:/__yuanrong/python/yr/datasystem/lib:${LD_LIBRARY_PATH}; YR_RUNTIME_MAIN=/__yuanrong/python/yr/main/yr_runtime_main.py; else YR_RUNTIME_MAIN='-m yr.cli.scripts runtime_main'; fi; python ${YR_RUNTIME_MAIN}"
    py310:
      cpu: 0
      memory: 0
      runtime: python3.10
      rootfs:
        runtime: runc
        type: image
        imageurl: "aio-yr-runtime:latest"
        readonly: true
        mountpoint: /mnt
      bootstrap:
        type: path
        root: "/opt/uv/python/cpython-3.10-linux-x86_64-gnu/lib/python3.10/site-packages/yr/inner/runtime/service"
        entrypoint: "set -e; if [ -f /__yuanrong/python/yr/main/yr_runtime_main.py ]; then export PYTHONPATH=/__yuanrong/python:${PYTHONPATH}; export LD_LIBRARY_PATH=/__yuanrong/python/yr/cpp/lib:/__yuanrong/python/yr/datasystem/lib:${LD_LIBRARY_PATH}; YR_RUNTIME_MAIN=/__yuanrong/python/yr/main/yr_runtime_main.py; else YR_RUNTIME_MAIN='-m yr.cli.scripts runtime_main'; fi; python ${YR_RUNTIME_MAIN}"
    java:
      cpu: 500
      memory: 500
      runtime: java1.8
    cpp:
      cpu: 500
      memory: 500
      runtime: cpp11
