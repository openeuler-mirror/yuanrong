entryPoints:
  web:
    address: ":8888"
  tcp:
    address: ":4443"

providers:
  # File provider for static configuration
  file:
    filename: /openyuanrong/traefik/dynamic.yml
    watch: true
  etcd:
    endpoints:
      - "__AIO_NODE_IP__:32379"
    rootKey: "traefik"

log:
  level: INFO

api:
  dashboard: false
