[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:runtime-launcher]
command=/usr/local/bin/runtime-launcher
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/runtime-launcher.log
stderr_logfile=/var/log/supervisor/runtime-launcher.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=10

[program:yr-node]
command=/usr/local/bin/start-node.sh
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/yr-node.log
stderr_logfile=/var/log/supervisor/yr-node.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=20
