---
# Required by Linux build jobs for OBS artifact uploads.
# Fill all values before applying this manifest.
apiVersion: v1
kind: Secret
metadata:
  name: obs-credentials
  namespace: default
type: Opaque
stringData:
  AK: ""
  SK: ""
  access-key-id: ""
  secret-access-key: ""
---
# Required by image packaging and Test K8S deploy jobs for SWR image push/pull.
# If swr-pull-secret already has push permission, swr-credentials can be left
# empty, but the CI deployer should verify that package_sandbox_release.sh can
# authenticate before enabling Build Image.
apiVersion: v1
kind: Secret
metadata:
  name: swr-credentials
  namespace: default
type: Opaque
stringData:
  username: ""
  password: ""
---
# Required as imagePullSecrets by Buildkite job pods in the default namespace.
# The key must be named .dockerconfigjson.
apiVersion: v1
kind: Secret
metadata:
  name: swr-pull-secret
  namespace: default
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: ""
---
# Required as imagePullSecrets by yuanrong-ci pods in the build-tools namespace,
# including gitcode-webhook-relay and cache-aging.
apiVersion: v1
kind: Secret
metadata:
  name: swr-pull-secret
  namespace: build-tools
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: ""
---
# Required by Test K8S. This is mounted at
# /var/run/yr-k8s/target/kubeconfig inside the deployer pod.
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-target-kubeconfig
  namespace: default
type: Opaque
stringData:
  kubeconfig: ""
---
# Required by Build X86 when publishing openyuanrong_sdk wheels to TestPyPI.
apiVersion: v1
kind: Secret
metadata:
  name: test-pypi-credentials
  namespace: default
type: Opaque
stringData:
  api-token: ""
---
# Required by gitcode-webhook-relay. The Buildkite API token is mandatory;
# set both webhook-token and webhook-signature-secret to the GitCode WebHook
# password so either GitCode delivery auth header is accepted.
apiVersion: v1
kind: Secret
metadata:
  name: gitcode-webhook-relay-auth
  namespace: build-tools
type: Opaque
stringData:
  buildkite-api-token: ""
  webhook-token: ""
  webhook-signature-secret: ""
