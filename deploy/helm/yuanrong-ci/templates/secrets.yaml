{{- $secrets := .Values.secrets | default dict }}
{{- $obsCredentials := $secrets.obsCredentials | default dict }}
{{- $swrCredentials := $secrets.swrCredentials | default dict }}
{{- $targetKubeconfig := $secrets.targetKubeconfig | default dict }}
{{- $testPypiCredentials := $secrets.testPypiCredentials | default dict }}
{{- $gitcodeWebhookRelayAuth := $secrets.gitcodeWebhookRelayAuth | default dict }}
{{- if and $obsCredentials.create $obsCredentials.accessKeyId }}
---
apiVersion: v1
kind: Secret
metadata:
  name: obs-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
data:
  AK: {{ $obsCredentials.accessKeyId | b64enc }}
  SK: {{ $obsCredentials.secretAccessKey | b64enc }}
  access-key-id: {{ $obsCredentials.accessKeyId | b64enc }}
  secret-access-key: {{ $obsCredentials.secretAccessKey | b64enc }}
{{- end }}
{{- if and $swrCredentials.create $swrCredentials.username }}
---
apiVersion: v1
kind: Secret
metadata:
  name: swr-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
stringData:
  username: {{ $swrCredentials.username | quote }}
  password: {{ $swrCredentials.password | quote }}
{{- end }}
{{- if $targetKubeconfig.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default .Values.agentStack.targetKubeconfig.secretName $targetKubeconfig.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
stringData:
  kubeconfig: {{ $targetKubeconfig.kubeconfig | quote }}
{{- end }}
{{- if and $testPypiCredentials.create $testPypiCredentials.apiToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: test-pypi-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
stringData:
  api-token: {{ $testPypiCredentials.apiToken | quote }}
{{- end }}
{{- if and $gitcodeWebhookRelayAuth.create $gitcodeWebhookRelayAuth.buildkiteApiToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gitcodeWebhookRelay.secretName }}
  namespace: {{ .Values.namespaces.buildTools }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
stringData:
  buildkite-api-token: {{ $gitcodeWebhookRelayAuth.buildkiteApiToken | quote }}
  webhook-token: {{ $gitcodeWebhookRelayAuth.webhookToken | quote }}
  webhook-signature-secret: {{ $gitcodeWebhookRelayAuth.webhookSignatureSecret | quote }}
{{- end }}
