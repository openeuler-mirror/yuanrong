#!/bin/bash
# Buildkite 动态 Pipeline - 标准 SSH 版
set -e
BUILDER_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260428_cmake33110"
SANDBOX_PACKAGER_IMAGE="${SANDBOX_PACKAGER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/sandbox-packager:v20260427_dind2}"
ENABLE_MACOS_SDK="${ENABLE_MACOS_SDK:-false}"
ENABLE_LINUX_ARM="${ENABLE_LINUX_ARM:-true}"
ENABLE_SANDBOX_PACKAGE="${ENABLE_SANDBOX_PACKAGE:-true}"
ENABLE_RUST_FUNCTIONSYSTEM_ST="${ENABLE_RUST_FUNCTIONSYSTEM_ST:-false}"
RUST_BUILDER_IMAGE="${RUST_BUILDER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004-rust:v20260507_x86_64}"
FUNCTIONSYSTEM_REPO="${FUNCTIONSYSTEM_REPO:-https://gitcode.com/openeuler/yuanrong-functionsystem.git}"
FUNCTIONSYSTEM_BRANCH="${FUNCTIONSYSTEM_BRANCH:-master}"

validate_ci_value() {
  local name="$1"
  local value="$2"
  local pattern="$3"

  if [[ ! "$value" =~ $pattern ]]; then
    echo "Invalid $name for dynamic pipeline: $value" >&2
    exit 1
  fi
}

echo "steps:"
cat << YAML
  - label: ":rocket: Build All"
    key: "build-all-amd64"
    command: |
      set -e
      echo "=== [1/3] Environment Setup ==="
      
      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      JOBS="\$\${JOBS:-16}"
      
      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$\$CACHE_BASE/ccache \$\$CACHE_BASE/go-mod \$\$CACHE_BASE/go-cache \$\$CACHE_BASE/opensource
      export CCACHE_DIR=\$\$CACHE_BASE/ccache
      export GOMODCACHE=\$\$CACHE_BASE/go-mod
      export GOCACHE=\$\$CACHE_BASE/go-cache/\$\${BUILDKITE_JOB_ID:-local}-\$\${BUILD_ARCH:-amd64}
      rm -rf "\$\$GOCACHE"
      mkdir -p "\$\$GOCACHE"
      export DS_OPENSOURCE_DIR=\$\$CACHE_BASE/opensource
      collect_failure_logs() {
        _STATUS="\$\$1"
        _ARCH="\$\${BUILD_ARCH:-x86_64}"
        _LOG_DIR="artifacts/failure-logs/\$\$_ARCH"
        echo "=== Build failed (exit \$\$_STATUS); collecting diagnostic logs ==="
        mkdir -p "\$\$_LOG_DIR"
        [ -f /tmp/build_output.log ] && cp /tmp/build_output.log "\$\$_LOG_DIR/build_output.log"
        for _DIR in \
            functionsystem/vendor/output/Stamp \
            functionsystem/vendor/src \
            functionsystem/build \
            datasystem/build; do
          if [ -d "\$\$_DIR" ]; then
            find "\$\$_DIR" -type f \( -name "*.log" -o -name "*.rej" \) -print >> "\$\$_LOG_DIR/file-list.txt" || true
          fi
        done
        if [ -s "\$\$_LOG_DIR/file-list.txt" ]; then
          tar -czf "\$\$_LOG_DIR/internal-logs.tar.gz" -T "\$\$_LOG_DIR/file-list.txt" || true
        fi
        ls -lh "\$\$_LOG_DIR" || true
        buildkite-agent artifact upload "\$\$_LOG_DIR/**/*" || true
      }
      # bazel-remote: write directly to ~/.bazelrc (Bazel reads unconditionally)
      # Use bash /dev/tcp (built-in, no nc required) to test connectivity
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      echo "=== Configuring bazel-remote cache ==="
      if timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        echo "bazel-remote reachable: \$\${BAZEL_REMOTE_URL}"
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      else
        echo "WARNING: bazel-remote not reachable, building without remote cache"
      fi
      
      echo "=== [2/3] Submodule Update ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4
      
      echo "=== [3/6] Starting Build (JOBS=\$\$JOBS) ==="
      # Snapshot bazel-remote before build (to compute delta later)
      _BAZEL_PRE=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
      _BAZEL_FILES_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
      _BAZEL_SIZE_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)

      BUILD_START=\$\$(date +%s)
      # Capture build output for Bazel action stats while showing live output.
      # Named pipe approach: POSIX-compatible, captures make exit code correctly
      # (avoids PIPESTATUS which is bash-only and fails under /bin/sh).
      # Keep top-level target execution sequential for stability.
      rm -f /tmp/yr_build_pipe
      mkfifo /tmp/yr_build_pipe
      tee /tmp/build_output.log < /tmp/yr_build_pipe &
      set +e
      make all JOBS=\$\$JOBS REMOTE_CACHE=\$\${REMOTE_CACHE:-} > /tmp/yr_build_pipe 2>&1
      BUILD_EXIT=\$\$?
      wait
      set -e
      rm -f /tmp/yr_build_pipe
      BUILD_END=\$\$(date +%s)
      BUILD_ELAPSED=\$\$(( BUILD_END - BUILD_START ))
      if [ "\$\$BUILD_EXIT" -ne 0 ]; then
        collect_failure_logs "\$\$BUILD_EXIT"
        exit "\$\$BUILD_EXIT"
      fi
      [ "\$\$BUILD_EXIT" -eq 0 ]

      echo "=== [3.5/6] Verify Go plugin ABI ==="
      python3 .buildkite/verify_go_plugin_abi.py

      (
        set +e
        echo "=== [4/6] Cache Hit Report ==="
        # --- Bazel action stats from build output ---
        # Last "INFO: N processes: ..." line in the log has the final tally
        _BAZEL_PROC=\$\$(grep -E "^INFO: [0-9,]+ processes:" /tmp/build_output.log | tail -1 || echo "")
        if [ -n "\$\$_BAZEL_PROC" ]; then
          _BAZEL_TOTAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processes" | tr -d ',')
          _BAZEL_TOTAL=\$\${_BAZEL_TOTAL% processes}
          _BAZEL_HIT=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ remote cache hit" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_LOCAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processwrapper-sandbox" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_INTERNAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ internal" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          if [ "\$\${_BAZEL_TOTAL:-0}" -gt 0 ] && [ "\$\${_BAZEL_HIT:-0}" -gt 0 ]; then
            _BAZEL_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\${_BAZEL_HIT}*100/(\$\${_BAZEL_TOTAL}-\$\${_BAZEL_INTERNAL:-0})}")
          else
            _BAZEL_RATIO="0.0"
          fi
          echo "bazel actions: total=\$\$_BAZEL_TOTAL internal=\$\$_BAZEL_INTERNAL cache_hit=\$\${_BAZEL_HIT:-0} local=\$\${_BAZEL_LOCAL:-0} hit_ratio=\$\$_BAZEL_RATIO%"
          echo "bazel summary: \$\$_BAZEL_PROC"
        else
          echo "bazel actions: (no summary found in log)"
          _BAZEL_HIT=0; _BAZEL_LOCAL=0; _BAZEL_RATIO="n/a"; _BAZEL_TOTAL=0; _BAZEL_INTERNAL=0
        fi

        # --- Bazel remote cache before/after delta ---
        _BAZEL_POST=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
        BAZEL_FILES=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
        BAZEL_SIZE_MB=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)
        _BAZEL_FILES_DELTA=\$\$(( \$\${BAZEL_FILES:-0} - \$\${_BAZEL_FILES_PRE:-0} ))
        _BAZEL_SIZE_DELTA=\$\$(( \$\${BAZEL_SIZE_MB:-0} - \$\${_BAZEL_SIZE_PRE:-0} ))
        echo "bazel-remote: files=\$\$BAZEL_FILES (+\$\$_BAZEL_FILES_DELTA), size=\$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)"

        # --- ccache ---
        CCACHE_HITS=\$\$(ccache -s 2>/dev/null | awk '/^cache hit/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_MISS=\$\$(ccache -s 2>/dev/null | awk '/^cache miss/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_TOTAL=\$\$(( CCACHE_HITS + CCACHE_MISS ))
        if [ "\$\$CCACHE_TOTAL" -gt 0 ]; then
          CCACHE_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\$CCACHE_HITS*100/\$\$CCACHE_TOTAL}")
        else
          CCACHE_RATIO="n/a"
        fi
        echo "ccache: hits=\$\$CCACHE_HITS miss=\$\$CCACHE_MISS ratio=\$\$CCACHE_RATIO%"

        # --- Go cache size ---
        GOCACHE_SIZE=\$\$(du -sh \$\$GOCACHE 2>/dev/null | cut -f1 || echo "?")
        GOMOD_SIZE=\$\$(du -sh \$\$GOMODCACHE 2>/dev/null | cut -f1 || echo "?")
        echo "go-cache: \$\${GOCACHE_SIZE}  go-mod: \$\${GOMOD_SIZE}"

        # --- datasystem CMake: fresh build each run, ccache handles incremental ---
        DS_CACHE_STATUS="fresh cmake (ccache backed)"
        echo "datasystem cmake: \$\$DS_CACHE_STATUS"

        # --- Build time ---
        BUILD_MIN=\$\$(( BUILD_ELAPSED / 60 ))
        BUILD_SEC=\$\$(( BUILD_ELAPSED % 60 ))
        echo "build time: \$\${BUILD_MIN}m\$\${BUILD_SEC}s"

        # --- Buildkite annotation (visible in UI) ---
        {
          echo "<h3>📊 Cache Hit Report</h3>"
          echo "<table>"
          echo "<tr><th>Cache</th><th>Detail</th><th>Hit Rate</th></tr>"
          echo "<tr><td>🔵 Bazel actions</td><td>total=\$\$_BAZEL_TOTAL, internal=\$\$_BAZEL_INTERNAL, hit=\$\${_BAZEL_HIT:-0}, local=\$\${_BAZEL_LOCAL:-0}</td><td><b>\$\$_BAZEL_RATIO%</b></td></tr>"
          echo "<tr><td>🗄️ Bazel remote store</td><td>\$\$BAZEL_FILES files (+\$\$_BAZEL_FILES_DELTA new), \$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)</td><td>-</td></tr>"
          echo "<tr><td>⚡ ccache</td><td>hits=\$\$CCACHE_HITS / total=\$\$CCACHE_TOTAL</td><td><b>\$\$CCACHE_RATIO%</b></td></tr>"
          echo "<tr><td>🐹 Go cache</td><td>\$\$GOCACHE_SIZE (module: \$\$GOMOD_SIZE)</td><td>-</td></tr>"
          echo "<tr><td>🏗️ datasystem cmake</td><td>\$\$DS_CACHE_STATUS</td><td>-</td></tr>"
          echo "<tr><td>⏱️ Build time</td><td colspan=2><b>\$\${BUILD_MIN}m\$\${BUILD_SEC}s</b></td></tr>"
          echo "</table>"
        } | buildkite-agent annotate --style "info" --context "cache-report"
      ) || echo "WARNING: cache report generation failed; continuing"

      echo "=== [5/6] Collect Artifacts ==="
      mkdir -p artifacts/release
      # Main output dir: yr-runtime, yr-dashboard, yr-faas, yr-functionsystem, *.whl
      cp output/*.tar.gz artifacts/release/ 2>/dev/null || true
      cp output/*.whl artifacts/release/ 2>/dev/null || true
      cp output/runtime-launcher artifacts/release/ 2>/dev/null || true
      # Sub-project outputs not already copied to output/
      cp datasystem/output/*.tar.gz artifacts/release/ 2>/dev/null || true
      cp datasystem/output/*.whl artifacts/release/ 2>/dev/null || true
      cp datasystem/output/sdk/*.whl artifacts/release/ 2>/dev/null || true
      cp functionsystem/output/*.whl artifacts/release/ 2>/dev/null || true
      ls -lh artifacts/release/

      echo "=== [6/6] Upload Artifacts to OBS ==="
      if [ -z "\$\${OBS_ACCESS_KEY_ID:-}" ] || [ -z "\$\${OBS_SECRET_ACCESS_KEY:-}" ]; then
        echo "WARNING: OBS credentials not set, skipping OBS upload"
      else
        python3 -c "from obs import ObsClient"
        UPLOAD_TIMESTAMP=\$\$(date '+%Y%m%d%H%M%S')
        UPLOAD_OK=0
        UPLOAD_FAIL=0
        OBS_URLS_FILE=artifacts/release/obs-urls.txt
        : > "\$\$OBS_URLS_FILE"
        for f in artifacts/release/*.tar.gz artifacts/release/*.whl; do
          [ -f "\$\$f" ] || continue
          echo "Uploading: \$\$f"
          if UPLOAD_OUTPUT=\$\$(python3 tools/upload_build_artifact.py \
              --file "\$\$f" \
              --kind build \
              --channel daily \
              --arch "\$\${BUILD_ARCH:-x86_64}" \
              --platform linux \
              --timestamp "\$\$UPLOAD_TIMESTAMP" 2>&1); then
            printf '%s\n' "\$\$UPLOAD_OUTPUT"
            UPLOAD_OK=\$\$((UPLOAD_OK + 1))
            OBS_URL=\$\$(printf '%s\n' "\$\$UPLOAD_OUTPUT" | sed -n 's/^url: //p' | tail -n 1)
            if [ -n "\$\$OBS_URL" ]; then
              printf '%s\t%s\n' "\$\$(basename "\$\$f")" "\$\$OBS_URL" >> "\$\$OBS_URLS_FILE"
            else
              echo "WARNING: Uploaded \$\$f but did not find public OBS URL in uploader output"
            fi
          else
            printf '%s\n' "\$\$UPLOAD_OUTPUT"
            echo "WARNING: Failed to upload \$\$f"
            UPLOAD_FAIL=\$\$((UPLOAD_FAIL + 1))
          fi
        done
        if [ -s "\$\$OBS_URLS_FILE" ]; then
          buildkite-agent artifact upload "\$\$OBS_URLS_FILE"
          rm -f "\$\$OBS_URLS_FILE"
        else
          rm -f "\$\$OBS_URLS_FILE"
        fi
        echo "OBS upload complete: \$\$UPLOAD_OK succeeded, \$\$UPLOAD_FAIL failed"
        [ "\$\$UPLOAD_FAIL" -eq 0 ]
      fi
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "16", memory: "32Gi" }
                  limits: { cpu: "16", memory: "32Gi" }
                env:
                  - name: GO111MODULE
                    value: "on"
                  - name: CGO_ENABLED
                    value: "1"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
    timeout_in_minutes: 180
    artifact_paths:
      - "artifacts/release/**/*"
YAML

case "${ENABLE_RUST_FUNCTIONSYSTEM_ST}" in
  1|true|TRUE|yes|YES|on|ON)
validate_ci_value "FUNCTIONSYSTEM_REPO" "$FUNCTIONSYSTEM_REPO" '^[A-Za-z0-9._:/@+~-]+$'
validate_ci_value "FUNCTIONSYSTEM_BRANCH" "$FUNCTIONSYSTEM_BRANCH" '^[A-Za-z0-9._/-]+$'
validate_ci_value "RUST_BUILDER_IMAGE" "$RUST_BUILDER_IMAGE" '^[A-Za-z0-9._:/@-]+$'

cat << YAML
  - label: ":crab: Rust FunctionSystem E2E"
    key: "rust-functionsystem-e2e-amd64"
    depends_on: "build-all-amd64"
    command: |
      bash -se <<'RUST_E2E_BASH'
      set -euo pipefail
      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      JOBS="\$\${JOBS:-16}"

      upload_rust_artifacts() {
        buildkite-agent artifact upload "artifacts/rust-fs-st/**/*" || true
      }
      trap upload_rust_artifacts EXIT

      mkdir -p output artifacts/rust-fs-st

      echo "=== [1/6] Download Build All artifacts ==="
      buildkite-agent artifact download "artifacts/release/*" . --step build-all-amd64
      cp artifacts/release/* output/

      echo "=== [2/6] Replace functionsystem source with Rust branch ==="
      rm -rf functionsystem
      git clone --depth 1 --branch "${FUNCTIONSYSTEM_BRANCH}" "${FUNCTIONSYSTEM_REPO}" functionsystem

      echo "=== [3/6] Prepare datasystem input for functionsystem ==="
      mkdir -p functionsystem/vendor/src
      cp output/yr-datasystem-*.tar.gz functionsystem/vendor/src/yr-datasystem.tar.gz

      echo "=== [4/6] Build Rust-backed functionsystem via normal contract ==="
      rm -f output/yr-functionsystem*.tar.gz
      make functionsystem JOBS=\$\$JOBS 2>&1 | tee artifacts/rust-fs-st/functionsystem_build.log

      echo "=== [5/6] Repackage openyuanrong with Rust functionsystem ==="
      rm -rf output/openyuanrong
      bash scripts/package_yuanrong.sh -v "rust-fs-ci-\$\${BUILDKITE_BUILD_NUMBER:-0}" 2>&1 | tee artifacts/rust-fs-st/package_yuanrong.log

      echo "=== [6/6] Run Python ST/E2E ==="
      export DEPLOY_PATH="\$\$PWD/artifacts/rust-fs-st/deploy"
      set +e
      bash test/st/test.sh -y "\$\$PWD/output/openyuanrong" -l python 2>&1 | tee artifacts/rust-fs-st/test_st_python.log
      TEST_EXIT=\$\$?
      set -e

      {
        echo "TEST_EXIT=\$\$TEST_EXIT"
        echo "BUILD_URL=\$\${BUILDKITE_BUILD_URL:-}"
        echo "FUNCTIONSYSTEM_REPO=${FUNCTIONSYSTEM_REPO}"
        echo "FUNCTIONSYSTEM_BRANCH=${FUNCTIONSYSTEM_BRANCH}"
        echo "RUST_BUILDER_IMAGE=${RUST_BUILDER_IMAGE}"
      } > artifacts/rust-fs-st/summary.txt
      cp failed_case_list artifacts/rust-fs-st/failed_case_list 2>/dev/null || true

      if [ "\$\$TEST_EXIT" -eq 0 ]; then
        buildkite-agent annotate --style "success" --context "rust-functionsystem-e2e" "Rust FunctionSystem E2E passed."
      else
        buildkite-agent annotate --style "error" --context "rust-functionsystem-e2e" "Rust FunctionSystem E2E failed. Download artifacts/rust-fs-st for logs."
      fi

      exit "\$\$TEST_EXIT"
      RUST_E2E_BASH
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$RUST_BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "16", memory: "32Gi" }
                  limits: { cpu: "16", memory: "32Gi" }
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
            imagePullSecrets:
              - name: swr-pull-secret
    timeout_in_minutes: 180
    artifact_paths:
      - "artifacts/rust-fs-st/**/*"
YAML
;;
esac

case "${ENABLE_SANDBOX_PACKAGE}" in
  1|true|TRUE|yes|YES|on|ON)
cat << YAML
  - label: ":package: Package sandbox images and Helm"
    key: "package-sandbox-amd64"
    depends_on: "build-all-amd64"
    command: |
      set -e
      bash .buildkite/package_sandbox_release.sh
    agents:
      queue: "default"
      os: "linux"
      arch: "amd64"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$SANDBOX_PACKAGER_IMAGE"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: docker-graph
                    mountPath: /var/lib/docker
                resources:
                  requests: { cpu: "8", memory: "16Gi" }
                  limits: { cpu: "8", memory: "16Gi" }
                env:
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
                  - name: SWR_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: username
                        optional: true
                  - name: SWR_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: swr-credentials
                        key: password
                        optional: true
                  - name: SWR_DOCKER_CONFIG_JSON
                    valueFrom:
                      secretKeyRef:
                        name: swr-pull-secret
                        key: .dockerconfigjson
                        optional: true
            volumes:
              - name: docker-graph
                emptyDir: {}
    timeout_in_minutes: 120
    artifact_paths:
      - "artifacts/sandbox/**/*"
YAML
;;
esac

case "${ENABLE_LINUX_ARM}" in
  1|true|TRUE|yes|YES|on|ON)
cat << YAML
  - label: ":penguin: Build All (linux-arm64)"
    command: |
      set -e
      echo "=== [1/3] Environment Setup ==="

      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      export BUILD_ARCH=arm64
      JOBS="\$\${JOBS:-16}"

      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$\$CACHE_BASE/ccache \$\$CACHE_BASE/go-mod \$\$CACHE_BASE/go-cache \$\$CACHE_BASE/opensource
      export CCACHE_DIR=\$\$CACHE_BASE/ccache
      export GOMODCACHE=\$\$CACHE_BASE/go-mod
      export GOCACHE=\$\$CACHE_BASE/go-cache/\$\${BUILDKITE_JOB_ID:-local}-\$\${BUILD_ARCH:-arm64}
      rm -rf "\$\$GOCACHE"
      mkdir -p "\$\$GOCACHE"
      export DS_OPENSOURCE_DIR=\$\$CACHE_BASE/opensource
      collect_failure_logs() {
        _STATUS="\$\$1"
        _ARCH="\$\${BUILD_ARCH:-x86_64}"
        _LOG_DIR="artifacts/failure-logs/\$\$_ARCH"
        echo "=== Build failed (exit \$\$_STATUS); collecting diagnostic logs ==="
        mkdir -p "\$\$_LOG_DIR"
        [ -f /tmp/build_output.log ] && cp /tmp/build_output.log "\$\$_LOG_DIR/build_output.log"
        for _DIR in \
            functionsystem/vendor/output/Stamp \
            functionsystem/vendor/src \
            functionsystem/build \
            datasystem/build; do
          if [ -d "\$\$_DIR" ]; then
            find "\$\$_DIR" -type f \( -name "*.log" -o -name "*.rej" \) -print >> "\$\$_LOG_DIR/file-list.txt" || true
          fi
        done
        if [ -s "\$\$_LOG_DIR/file-list.txt" ]; then
          tar -czf "\$\$_LOG_DIR/internal-logs.tar.gz" -T "\$\$_LOG_DIR/file-list.txt" || true
        fi
        ls -lh "\$\$_LOG_DIR" || true
        buildkite-agent artifact upload "\$\$_LOG_DIR/**/*" || true
      }
      BAZEL_REMOTE_URL="grpc://bazel-remote.build-tools.svc.cluster.local:9092"
      echo "=== Configuring bazel-remote cache ==="
      if timeout 5 bash -c "echo > /dev/tcp/bazel-remote.build-tools.svc.cluster.local/9092" 2>/dev/null; then
        echo "bazel-remote reachable: \$\${BAZEL_REMOTE_URL}"
        export REMOTE_CACHE="\$\${BAZEL_REMOTE_URL}"
      else
        echo "WARNING: bazel-remote not reachable, building without remote cache"
      fi

      echo "=== [2/3] Submodule Update ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4

      echo "=== [3/6] Starting Build (JOBS=\$\$JOBS) ==="
      _BAZEL_PRE=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
      _BAZEL_FILES_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
      _BAZEL_SIZE_PRE=\$\$(echo "\$\$_BAZEL_PRE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)

      BUILD_START=\$\$(date +%s)
      rm -f /tmp/yr_build_pipe
      mkfifo /tmp/yr_build_pipe
      tee /tmp/build_output.log < /tmp/yr_build_pipe &
      set +e
      make all JOBS=\$\$JOBS REMOTE_CACHE=\$\${REMOTE_CACHE:-} > /tmp/yr_build_pipe 2>&1
      BUILD_EXIT=\$\$?
      wait
      set -e
      rm -f /tmp/yr_build_pipe
      BUILD_END=\$\$(date +%s)
      BUILD_ELAPSED=\$\$(( BUILD_END - BUILD_START ))
      if [ "\$\$BUILD_EXIT" -ne 0 ]; then
        collect_failure_logs "\$\$BUILD_EXIT"
        exit "\$\$BUILD_EXIT"
      fi
      [ "\$\$BUILD_EXIT" -eq 0 ]

      echo "=== [3.5/6] Verify Go plugin ABI ==="
      python3 .buildkite/verify_go_plugin_abi.py

      (
        set +e
        echo "=== [4/6] Cache Hit Report ==="
        _BAZEL_PROC=\$\$(grep -E "^INFO: [0-9,]+ processes:" /tmp/build_output.log | tail -1 || echo "")
        if [ -n "\$\$_BAZEL_PROC" ]; then
          _BAZEL_TOTAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processes" | tr -d ',')
          _BAZEL_TOTAL=\$\${_BAZEL_TOTAL% processes}
          _BAZEL_HIT=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ remote cache hit" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_LOCAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ processwrapper-sandbox" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          _BAZEL_INTERNAL=\$\$(echo "\$\$_BAZEL_PROC" | grep -oE "[0-9,]+ internal" | tr -d ',' | awk '{print \$\$1}' || echo 0)
          if [ "\$\${_BAZEL_TOTAL:-0}" -gt 0 ] && [ "\$\${_BAZEL_HIT:-0}" -gt 0 ]; then
            _BAZEL_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\${_BAZEL_HIT}*100/(\$\${_BAZEL_TOTAL}-\$\${_BAZEL_INTERNAL:-0})}")
          else
            _BAZEL_RATIO="0.0"
          fi
          echo "bazel actions: total=\$\$_BAZEL_TOTAL internal=\$\$_BAZEL_INTERNAL cache_hit=\$\${_BAZEL_HIT:-0} local=\$\${_BAZEL_LOCAL:-0} hit_ratio=\$\$_BAZEL_RATIO%"
          echo "bazel summary: \$\$_BAZEL_PROC"
        else
          echo "bazel actions: (no summary found in log)"
          _BAZEL_HIT=0; _BAZEL_LOCAL=0; _BAZEL_RATIO="n/a"; _BAZEL_TOTAL=0; _BAZEL_INTERNAL=0
        fi

        _BAZEL_POST=\$\$(wget -qO- http://bazel-remote.build-tools.svc.cluster.local:8080/status 2>/dev/null || echo '{}')
        BAZEL_FILES=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NumFiles',0))" 2>/dev/null || echo 0)
        BAZEL_SIZE_MB=\$\$(echo "\$\$_BAZEL_POST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('CurrSize',0))//1024//1024)" 2>/dev/null || echo 0)
        _BAZEL_FILES_DELTA=\$\$(( \$\${BAZEL_FILES:-0} - \$\${_BAZEL_FILES_PRE:-0} ))
        _BAZEL_SIZE_DELTA=\$\$(( \$\${BAZEL_SIZE_MB:-0} - \$\${_BAZEL_SIZE_PRE:-0} ))
        echo "bazel-remote: files=\$\$BAZEL_FILES (+\$\$_BAZEL_FILES_DELTA), size=\$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)"

        CCACHE_HITS=\$\$(ccache -s 2>/dev/null | awk '/^cache hit/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_MISS=\$\$(ccache -s 2>/dev/null | awk '/^cache miss/ {sum += \$\$NF} END {print sum+0}' || echo 0)
        CCACHE_TOTAL=\$\$(( CCACHE_HITS + CCACHE_MISS ))
        if [ "\$\$CCACHE_TOTAL" -gt 0 ]; then
          CCACHE_RATIO=\$\$(awk "BEGIN{printf \"%.1f\", \$\$CCACHE_HITS*100/\$\$CCACHE_TOTAL}")
        else
          CCACHE_RATIO="n/a"
        fi
        echo "ccache: hits=\$\$CCACHE_HITS miss=\$\$CCACHE_MISS ratio=\$\$CCACHE_RATIO%"

        GOCACHE_SIZE=\$\$(du -sh \$\$GOCACHE 2>/dev/null | cut -f1 || echo "?")
        GOMOD_SIZE=\$\$(du -sh \$\$GOMODCACHE 2>/dev/null | cut -f1 || echo "?")
        echo "go-cache: \$\${GOCACHE_SIZE}  go-mod: \$\${GOMOD_SIZE}"

        DS_CACHE_STATUS="fresh cmake (ccache backed)"
        echo "datasystem cmake: \$\$DS_CACHE_STATUS"

        BUILD_MIN=\$\$(( BUILD_ELAPSED / 60 ))
        BUILD_SEC=\$\$(( BUILD_ELAPSED % 60 ))
        echo "build time: \$\${BUILD_MIN}m\$\${BUILD_SEC}s"

        {
          echo "<h3>📊 Cache Hit Report</h3>"
          echo "<table>"
          echo "<tr><th>Cache</th><th>Detail</th><th>Hit Rate</th></tr>"
          echo "<tr><td>🔵 Bazel actions</td><td>total=\$\$_BAZEL_TOTAL, internal=\$\$_BAZEL_INTERNAL, hit=\$\${_BAZEL_HIT:-0}, local=\$\${_BAZEL_LOCAL:-0}</td><td><b>\$\$_BAZEL_RATIO%</b></td></tr>"
          echo "<tr><td>🗄️ Bazel remote store</td><td>\$\$BAZEL_FILES files (+\$\$_BAZEL_FILES_DELTA new), \$\${BAZEL_SIZE_MB}MB (+\$\${_BAZEL_SIZE_DELTA}MB)</td><td>-</td></tr>"
          echo "<tr><td>⚡ ccache</td><td>hits=\$\$CCACHE_HITS / total=\$\$CCACHE_TOTAL</td><td><b>\$\$CCACHE_RATIO%</b></td></tr>"
          echo "<tr><td>🐹 Go cache</td><td>\$\$GOCACHE_SIZE (module: \$\$GOMOD_SIZE)</td><td>-</td></tr>"
          echo "<tr><td>🏗️ datasystem cmake</td><td>\$\$DS_CACHE_STATUS</td><td>-</td></tr>"
          echo "<tr><td>⏱️ Build time</td><td colspan=2><b>\$\${BUILD_MIN}m\$\${BUILD_SEC}s</b></td></tr>"
          echo "</table>"
        } | buildkite-agent annotate --style "info" --context "cache-report-arm64"
      ) || echo "WARNING: cache report generation failed; continuing"

      echo "=== [5/6] Collect Artifacts ==="
      mkdir -p artifacts/release
      cp output/*.tar.gz artifacts/release/ 2>/dev/null || true
      cp output/*.whl artifacts/release/ 2>/dev/null || true
      cp datasystem/output/*.tar.gz artifacts/release/ 2>/dev/null || true
      cp datasystem/output/*.whl artifacts/release/ 2>/dev/null || true
      cp datasystem/output/sdk/*.whl artifacts/release/ 2>/dev/null || true
      cp functionsystem/output/*.whl artifacts/release/ 2>/dev/null || true
      ls -lh artifacts/release/

      echo "=== [6/6] Upload Artifacts to OBS ==="
      if [ -z "\$\${OBS_ACCESS_KEY_ID:-}" ] || [ -z "\$\${OBS_SECRET_ACCESS_KEY:-}" ]; then
        echo "WARNING: OBS credentials not set, skipping OBS upload"
      else
        python3 -c "from obs import ObsClient"
        UPLOAD_TIMESTAMP=\$\$(date '+%Y%m%d%H%M%S')
        UPLOAD_OK=0
        UPLOAD_FAIL=0
        OBS_URLS_FILE=artifacts/release/obs-urls.txt
        : > "\$\$OBS_URLS_FILE"
        for f in artifacts/release/*.tar.gz artifacts/release/*.whl; do
          [ -f "\$\$f" ] || continue
          echo "Uploading: \$\$f"
          if UPLOAD_OUTPUT=\$\$(python3 tools/upload_build_artifact.py \
              --file "\$\$f" \
              --kind build \
              --channel daily \
              --arch arm64 \
              --platform linux \
              --timestamp "\$\$UPLOAD_TIMESTAMP" 2>&1); then
            printf '%s\n' "\$\$UPLOAD_OUTPUT"
            UPLOAD_OK=\$\$((UPLOAD_OK + 1))
            OBS_URL=\$\$(printf '%s\n' "\$\$UPLOAD_OUTPUT" | sed -n 's/^url: //p' | tail -n 1)
            if [ -n "\$\$OBS_URL" ]; then
              printf '%s\t%s\n' "\$\$(basename "\$\$f")" "\$\$OBS_URL" >> "\$\$OBS_URLS_FILE"
            else
              echo "WARNING: Uploaded \$\$f but did not find public OBS URL in uploader output"
            fi
          else
            printf '%s\n' "\$\$UPLOAD_OUTPUT"
            echo "WARNING: Failed to upload \$\$f"
            UPLOAD_FAIL=\$\$((UPLOAD_FAIL + 1))
          fi
        done
        if [ -s "\$\$OBS_URLS_FILE" ]; then
          buildkite-agent artifact upload "\$\$OBS_URLS_FILE"
          rm -f "\$\$OBS_URLS_FILE"
        else
          rm -f "\$\$OBS_URLS_FILE"
        fi
        echo "OBS upload complete: \$\$UPLOAD_OK succeeded, \$\$UPLOAD_FAIL failed"
        [ "\$\$UPLOAD_FAIL" -eq 0 ]
      fi
    agents:
      queue: "default"
      os: "linux"
      linux_arch: "arm64"
    plugins:
      - kubernetes:
          podSpec:
            nodeSelector:
              kubernetes.io/arch: arm64
            containers:
              - image: "$BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                resources:
                  requests: { cpu: "16", memory: "32Gi" }
                  limits: { cpu: "16", memory: "32Gi" }
                env:
                  - name: GO111MODULE
                    value: "on"
                  - name: CGO_ENABLED
                    value: "1"
                  - name: GOARCH
                    value: "arm64"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
                  - name: OBS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: AK
                        optional: true
                  - name: OBS_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: obs-credentials
                        key: SK
                        optional: true
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
    timeout_in_minutes: 180
    artifact_paths:
      - "artifacts/release/**/*"
YAML
;;
esac

case "${ENABLE_MACOS_SDK}" in
  1|true|TRUE|yes|YES|on|ON)
cat << YAML
  - label: ":apple: Build macOS SDK"
    command: |
      set -e
      echo "=== [1/4] Sync submodules ==="
      git submodule sync --recursive
      git submodule update --init --recursive --force --jobs=4

      echo "=== [2/4] Build macOS SDK ==="
      bash build.sh

      echo "=== [3/4] Collect openyuanrong-sdk artifacts ==="
      mkdir -p artifacts/openyuanrong-sdk
      cp output/openyuanrong_sdk-*.whl artifacts/openyuanrong-sdk/
      ls -lh artifacts/openyuanrong-sdk/
    agents:
      queue: "default"
      os: "macos"
      arch: "arm64"
    timeout_in_minutes: 180
    artifact_paths:
      - "artifacts/openyuanrong-sdk/**/*"
YAML
;;
esac
