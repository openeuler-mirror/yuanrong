# agent-stack-k8s Helm values
# Reference: https://github.com/buildkite/agent-stack-k8s
#
# Install:
#   helm upgrade --install agent-stack-k8s oci://ghcr.io/buildkite/helm/agent-stack-k8s \
#     --version 0.40.0 \
#     -f deploy/helm/agent-stack-k8s-values.yaml \
#     --set agentToken="${BUILDKITE_AGENT_TOKEN}" \
#     -n default

agentToken: ""

config:
  tags:
    - queue=default
    - arch=amd64
  image: swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/buildkite-agent:sha256-a400cd028e449f389c7223a990cdb34adb5d96584a8f3863ba442550eac2a4c1
  image-pull-backoff-grace-period: 15m
  pod-pending-timeout: 20m

nodeSelector:
  kubernetes.io/arch: amd64

podTemplate:
  spec: {}
