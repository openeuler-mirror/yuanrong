[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:traefik]
command=/usr/local/bin/traefik --configFile=/openyuanrong/traefik/traefik.yml
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/traefik.log
stderr_logfile=/var/log/supervisor/traefik.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=10

[program:runtime-launcher]
command=/openyuanrong/runtime-launcher
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/runtime-launcher.log
stderr_logfile=/var/log/supervisor/runtime-launcher.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=20

[program:seed-traefik-etcd]
command=/usr/local/bin/seed-traefik-etcd.sh
autostart=true
autorestart=false
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/seed-traefik-etcd.log
stderr_logfile=/var/log/supervisor/seed-traefik-etcd.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=25
startsecs=0

[program:yuanrong-master]
command=/usr/local/bin/start-yuanrong.sh
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/yuanrong.log
stderr_logfile=/var/log/supervisor/yuanrong.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
priority=30
startsecs=5
environment=CONTAINER_EP="unix:///var/run/runtime-launcher.sock"
