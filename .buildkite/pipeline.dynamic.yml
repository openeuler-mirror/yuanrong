#!/bin/bash
# Buildkite 动态 Pipeline - 标准 SSH 版
set -e
BUILDER_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260409_guaranteed"

echo "steps:"
cat << YAML
  - label: ":rocket: Build All"
    command: |
      set -e
      echo "=== [1/3] SSH & Environment Setup ==="
      mkdir -p /root/.ssh
      cp /tmp/ssh-key/id_ed25519 /root/.ssh/id_ed25519
      chmod 600 /root/.ssh/id_ed25519
      echo -e "Host gitcode.com\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" > /root/.ssh/config
      
      export PATH=/opt/buildtools/python3.9/bin:/usr/local/bin:/usr/bin:\$PATH
      export CC=gcc-10
      export CXX=g++-10
      export PIP_BREAK_SYSTEM_PACKAGES=1
      
      CACHE_BASE="/mnt/paas/build-cache"
      mkdir -p \$CACHE_BASE/ccache \$CACHE_BASE/go-mod \$CACHE_BASE/go-cache \$CACHE_BASE/opensource
      export CCACHE_DIR=\$CACHE_BASE/ccache
      export GOMODCACHE=\$CACHE_BASE/go-mod
      export GOCACHE=\$CACHE_BASE/go-cache
      export DS_OPENSOURCE_DIR=\$CACHE_BASE/opensource
      export CMAKE_C_COMPILER_LAUNCHER=ccache
      export CMAKE_CXX_COMPILER_LAUNCHER=ccache
      
      echo "=== [2/3] Submodule Update ==="
      # 显式执行同步，方便查看报错
      git submodule sync --recursive
      git submodule update --init --recursive --force
      
      echo "=== [3/3] Starting Build (JOBS=24) ==="
      make all JOBS=24
      
      echo "=== 4. Artifacts ==="
      mkdir -p artifacts/release
      cp frontend/output/*.tar.gz artifacts/release/ 2>/dev/null || true
      cp datasystem/output/*.tar.gz artifacts/release/ 2>/dev/null || true
      ls -lh artifacts/release/
    agents:
      queue: "default"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "$BUILDER_IMAGE"
                volumeMounts:
                  - name: build-cache
                    mountPath: /mnt/paas
                  - name: ssh-key-secret
                    mountPath: /tmp/ssh-key
                    readOnly: true
                resources:
                  requests: { cpu: "16", memory: "32Gi" }
                  limits: { cpu: "24", memory: "48Gi" }
                env:
                  - name: GOWORK
                    value: "off"
                  - name: GO111MODULE
                    value: "on"
                  - name: CGO_ENABLED
                    value: "1"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
            volumes:
              - name: build-cache
                hostPath:
                  path: /mnt/paas
                  type: DirectoryOrCreate
              - name: ssh-key-secret
                secret:
                  secretName: gitcode-ssh-key
    timeout_in_minutes: 120
    artifact_paths:
      - "artifacts/release/**/*"
YAML
