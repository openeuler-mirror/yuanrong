{{- if .Values.node.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "yr-k8s.componentName" (dict "root" . "component" "node") }}
  labels:
    {{- include "yr-k8s.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "yr-k8s.serviceAccountName" (dict "root" . "component" "node" "values" .Values.node) }}
    namespace: {{ include "yr-k8s.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "yr-k8s.componentName" (dict "root" . "component" "node") }}
{{- end }}
