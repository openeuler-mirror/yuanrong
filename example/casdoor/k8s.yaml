apiVersion: v1
kind: Namespace
metadata:
  name: yuanrong-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: casdoor-secrets
  namespace: yuanrong-auth
type: Opaque
stringData:
  postgres-password: "casdoor_password"
  casdoor-data-source: "user=casdoor password=casdoor_password host=casdoor-db port=5432 sslmode=disable dbname=casdoor"
  casdoor-client-secret: "placeholder-secret-for-oidc-clients"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: casdoor-config-tmpl
  namespace: yuanrong-auth
data:
  app.conf.template: |
    appname = casdoor
    httpport = 8000
    runmode = dev
    copyrequestbody = true
    driverName = postgres
    dataSourceName = ${CASDOOR_DATA_SOURCE}
    dbName = casdoor
    tableNamePrefix =
    showSql = false
    redisEndpoint =
    defaultStorageProvider =
    isDemoMode = false
    batchSize = 100
    ldapServer =
    ldapPort =
    ldapBaseDn =
    ldapAdminDn =
    ldapAdminPassword =
    ldapUserFilter =
    ldapGroupFilter =
    ldapGroupBaseDn =
    ldapGroupMemberAttribute =
    ldapGroupMemberFormat =
    ldapIdAttribute =
    origin = "http://casdoor.local"
    staticBaseUrl = "https://cdn.casbin.org"
    initDataFile = "./init_data.json"
    frontendBaseUrl = "http://casdoor.local"
    verificationCodeTimeout = 5
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: yuanrong-auth
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailpit-pvc
  namespace: yuanrong-auth
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: casdoor-db
  namespace: yuanrong-auth
spec:
  selector:
    app: casdoor-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: casdoor
  namespace: yuanrong-auth
spec:
  selector:
    app: casdoor
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: yuanrong-auth
spec:
  selector:
    app: mailpit
  ports:
    - name: http
      protocol: TCP
      port: 8025
      targetPort: 8025
    - name: smtp
      protocol: TCP
      port: 1025
      targetPort: 1025
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: casdoor-db
  namespace: yuanrong-auth
spec:
  serviceName: "casdoor-db"
  replicas: 1
  selector:
    matchLabels:
      app: casdoor-db
  template:
    metadata:
      labels:
        app: casdoor-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "casdoor"
            - name: POSTGRES_DB
              value: "casdoor"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casdoor-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "casdoor"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "casdoor"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: yuanrong-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          env:
            - name: MP_MAX_MESSAGES
              value: "500"
            - name: MP_DATABASE
              value: "/data/mailpit.db"
          ports:
            - containerPort: 8025
            - containerPort: 1025
          volumeMounts:
            - name: mailpit-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/messages
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: mailpit-data
          persistentVolumeClaim:
            claimName: mailpit-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: casdoor
  namespace: yuanrong-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: casdoor
  template:
    metadata:
      labels:
        app: casdoor
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:latest
          command: ['sh', '-c', 'until nc -z casdoor-db 5432; do echo waiting for db; sleep 2; done;']
        - name: render-config
          image: nginx:alpine
          env:
            - name: CASDOOR_DATA_SOURCE
              valueFrom:
                secretKeyRef:
                  name: casdoor-secrets
                  key: casdoor-data-source
          command: ['sh', '-c', 'envsubst < /template/app.conf.template > /work/app.conf']
          volumeMounts:
            - name: template-vol
              mountPath: /template
            - name: config-vol
              mountPath: /work
      containers:
        - name: casdoor
          image: casbin/casdoor:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: config-vol
              mountPath: /conf/app.conf
              subPath: app.conf
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: template-vol
          configMap:
            name: casdoor-config-tmpl
        - name: config-vol
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yuanrong-auth-ingress
  namespace: yuanrong-auth
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: casdoor.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: casdoor
                port:
                  number: 8000
    - host: mailpit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025
