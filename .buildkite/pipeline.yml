# Buildkite Pipeline - Standard SSH Mode

env:
  BUILD_ARCH: "amd64"
  BUILDER_IMAGE: "swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260409_guaranteed"

steps:
  - label: ":key: Initialize and Load"
    command: |
      set -e
      echo "=== 1. Prepare SSH Environment ==="
      mkdir -p /root/.ssh
      cp /tmp/ssh-key/id_ed25519 /root/.ssh/id_ed25519
      chmod 600 /root/.ssh/id_ed25519
      echo -e "Host gitcode.com\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" > /root/.ssh/config
      
      echo "=== 2. Load Dynamic Pipeline ==="
      bash .buildkite/pipeline.dynamic.yml | buildkite-agent pipeline upload
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:v20260409_guaranteed"
                volumeMounts:
                  - name: ssh-key-secret
                    mountPath: /tmp/ssh-key
                    readOnly: true
                resources:
                  limits: { cpu: "4", memory: "8Gi" }
            volumes:
              - name: ssh-key-secret
                secret:
                  secretName: gitcode-ssh-key
    agents:
      queue: "default"
