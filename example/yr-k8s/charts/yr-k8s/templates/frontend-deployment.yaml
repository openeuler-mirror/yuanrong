{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yr-k8s.componentName" (dict "root" . "component" "frontend") }}
  namespace: {{ include "yr-k8s.namespace" . }}
  labels:
    {{- include "yr-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "yr-k8s.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "yr-k8s.image" (dict "root" . "image" .Values.global.images.frontend) }}
          imagePullPolicy: {{ .Values.global.images.frontend.pullPolicy }}
          command:
            - /usr/local/bin/start-frontend.sh
          env:
            - name: RUNTIME_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUNTIME_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RUNTIME_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: YR_ETCD_ADDR_LIST
              value: {{ .Values.global.externalEtcd.addrList | quote }}
            - name: YR_MASTER_IP
              value: {{ include "yr-k8s.componentName" (dict "root" . "component" "master-access") }}
            - name: YR_META_SERVICE_ADDRESS
              value: {{ printf "%s:%v" (include "yr-k8s.componentName" (dict "root" . "component" "master-access")) .Values.master.service.ports.metaService | quote }}
            - name: META_SERVICE_ADDRESS
              value: {{ printf "http://%s:%v" (include "yr-k8s.componentName" (dict "root" . "component" "master-access")) .Values.master.service.ports.metaService | quote }}
            - name: IAM_SERVER_ADDRESS
              value: {{ default (printf "%s:%v" (include "yr-k8s.componentName" (dict "root" . "component" "master-access")) .Values.master.service.ports.iamServer) .Values.frontend.iamServerAddress | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
{{- with .Values.frontend.probes.readiness }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.frontend.probes.liveness }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.frontend.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: components
              mountPath: /etc/yuanrong/config.toml
              subPath: config.toml
            - name: services-config
              mountPath: /home/sn/service-config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: session-dir
              mountPath: {{ .Values.debug.sidecar.sessionDir }}
        - name: debug-busybox
          image: {{ include "yr-k8s.image" (dict "root" . "image" .Values.debug.sidecar.image) }}
          imagePullPolicy: {{ .Values.debug.sidecar.image.pullPolicy }}
          command:
{{ toYaml .Values.debug.sidecar.command | nindent 12 }}
          volumeMounts:
            - name: components
              mountPath: /etc/yuanrong/config.toml
              subPath: config.toml
            - name: services-config
              mountPath: /home/sn/service-config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: session-dir
              mountPath: {{ .Values.debug.sidecar.sessionDir }}
      volumes:
        - name: components
          configMap:
            name: {{ include "yr-k8s.fullname" . }}-components
        - name: services-config
          configMap:
            name: {{ include "yr-k8s.componentName" (dict "root" . "component" "services") }}
            items:
              - key: services.yaml
                path: services.yaml
        - name: session-dir
          emptyDir: {}
{{- end }}
