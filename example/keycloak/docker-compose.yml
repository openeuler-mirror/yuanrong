services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: yr-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KC_HOSTNAME_ADMIN_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
    ports:
      - "8080:8080"   # 宿主机侧 init-realm.sh 等脚本通过 localhost:8080 访问
    volumes:
      - ./data/data:/opt/keycloak/data
    command: start-dev
    networks:
      - yr-net
    restart: unless-stopped

networks:
  yr-net:
    external: true
