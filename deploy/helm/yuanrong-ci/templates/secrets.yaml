{{- if and .Values.secrets.obsCredentials.create .Values.secrets.obsCredentials.accessKeyId }}
---
apiVersion: v1
kind: Secret
metadata:
  name: obs-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
data:
  access-key-id: {{ .Values.secrets.obsCredentials.accessKeyId | b64enc }}
  secret-access-key: {{ .Values.secrets.obsCredentials.secretAccessKey | b64enc }}
{{- end }}
{{- if and .Values.secrets.gitcodeWebhookRelayAuth.create .Values.secrets.gitcodeWebhookRelayAuth.buildkiteApiToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gitcodeWebhookRelay.secretName }}
  namespace: {{ .Values.namespaces.buildTools }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: yuanrong-ci
type: Opaque
stringData:
  buildkite-api-token: {{ .Values.secrets.gitcodeWebhookRelayAuth.buildkiteApiToken | quote }}
  webhook-token: {{ .Values.secrets.gitcodeWebhookRelayAuth.webhookToken | quote }}
  webhook-signature-secret: {{ .Values.secrets.gitcodeWebhookRelayAuth.webhookSignatureSecret | quote }}
{{- end }}
