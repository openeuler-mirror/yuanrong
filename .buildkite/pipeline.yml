# Buildkite Pipeline - K8s Native

env:
  BUILD_ARCH: "${BUILD_ARCH:-amd64}"
  BUILDER_IMAGE: "${BUILDER_IMAGE:-swr.cn-southwest-2.myhuaweicloud.com/yuanrong-dev/compile-ubuntu2004:latest-${BUILD_ARCH:-amd64}}"

steps:
  - label: ":linux: K8s 原生构建"
    command: |
      set -e
      echo "=== 环境初始化 ==="
      [ -f "/etc/profile.d/buildtools.sh" ] && . /etc/profile.d/buildtools.sh
      
      echo "=== 环境信息 ==="
      go version || echo "go not found"
      
      echo "=== 加载动态流水线 ==="
      buildkite-agent pipeline upload .buildkite/pipeline.dynamic.yml
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: "${BUILDER_IMAGE}"
                env:
                  - name: GO111MODULE
                    value: "on"
                  - name: GOPROXY
                    value: "https://goproxy.cn,direct"
    agents:
      queue: "${BUILD_QUEUE:-default}"
